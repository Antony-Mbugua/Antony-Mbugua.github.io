# ===========================
# The Site Configuration
# ===========================

# Import the theme
theme: jekyll-theme-chirpy

# Site language
lang: en

# Set your timezone (Kenya)
timezone: Africa/Nairobi

# ===========================
# SEO & Branding
# ===========================

title: "Antony Mbugua"
tagline: "Cybersecurity • SOC Analysis • Ethical Hacking"
description: >-
  Cybersecurity Intern at The Red Users and BSc Applied Computing finalist (InfoSec & Forensics).
  Passionate about SOC operations, ethical hacking, cloud & network security, and building secure enterprise systems.

url: "https://antony-mbugua.github.io"

github:
  username: Antony-Mbugua

twitter:
  username: "" # Leave blank unless you actually use Twitter/X

social:
  name: "Antony Mbugua"
  email: "antonymbugua742@gmail.com"
  links:
    - https://github.com/Antony-Mbugua
    - https://www.linkedin.com/in/antony-mbugua-githinji/
    - https://www.credly.com/users/antony-mbugua 
    - https://app.hackthebox.com/profile/123456 
    - https://tryhackme.com/p/incog742

# Site verification (optional, if you add Google Analytics / Webmaster)
webmaster_verifications:
  google:
  bing:
  yandex:

# ===========================
# Analytics (optional)
# ===========================
analytics:
  google:
    id: "" # Add Google Analytics if you want tracking

# ===========================
# Theme & UI
# ===========================
theme_mode: # default = system preference

avatar: "/assets/img/profile/me.png" # Add your profile pic here
social_preview_image: "/assets/img/profile/banner.png" # Custom banner for SEO/social previews

toc: true

# ===========================
# Comments (optional)
# ===========================
comments:
  provider: giscus
  giscus:
    repo: "Antony-Mbugua/antony-mbugua.github.io"
    repo_id: "" # GitHub repo ID (from Giscus setup)
    category: "Comments"
    category_id: "" # Fill after configuring Giscus
    mapping: "pathname"
    reactions_enabled: 1

# ===========================
# PWA (offline + installable)
# ===========================
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:
      - "/example"

paginate: 10

baseurl: ""

# ===========================
# Syntax Highlighting
# ===========================
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# ===========================
# Custom Collections
# ===========================
collections:
  writeups:
    output: true
    permalink: /writeups/:title/
  projects:
    output: true
    permalink: /projects/:title/
  badges:
    output: true
    permalink: /badges/:title/
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# ===========================
# Compression
# ===========================
sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

# ===========================
# Archives
# ===========================
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
