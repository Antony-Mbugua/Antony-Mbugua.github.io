# Author Profile
author:
  name: "ANTONY MBUGUA GITHINJI"
  avatar: "/assets/images/bio-photo.jpeg"
  bio: "BSc. Applied Computing | Cyber Shujaa Scholar | Security Researcher"
  location: "Nairobi, Kenya"
  links:
