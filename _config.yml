title: "ANTONY"
tagline: "Red Team Operator | Secure Systems Architect"
description: >-
  Final-year Information Security student and Ethical Hacker.
  Passionate about penetration testing, threat intelligence, and secure system development.

email: antonymbugua742@gmail.com
url: "https://antony-mbugua.github.io"
baseurl: ""

repository: "antony-mbugua/antony-mbugua.github.io"

timezone: "Africa/Nairobi"
permalink: pretty
markdown: kramdown
highlighter: rouge

# ---------------------------------------------------------------
# Theme Settings
# ---------------------------------------------------------------
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"
search: true
search_full_content: true
dark_mode: true

sass:
  style: compressed

# ---------------------------------------------------------------
# Author Profile
# ---------------------------------------------------------------
author:
  name: "Antony Mbugua Githinji"
  avatar: "/assets/images/bio-photo.jpeg"
  bio: "Red Teamer | InfoSec Student | Applied Computing @ KCA"
  location: "Nairobi, Kenya"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/antony-mbugua"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://linkedin.com/in/antony-mbugua"
    - label: "Hack The Box"
      icon: "fas fa-terminal"
      url: "https://app.hackthebox.com/profile/kiregi742"
    - label: "TryHackMe"
      icon: "fas fa-user-secret"
      url: "https://tryhackme.com/p/incog742"

# ---------------------------------------------------------------
# Appearance & Preview
# ---------------------------------------------------------------
avatar: "/assets/images/red-team.jpeg"
social_preview_image: "/assets/images/cyber-meta.jpeg"

# ---------------------------------------------------------------
# Footer
# ---------------------------------------------------------------
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/antony-mbugua"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://linkedin.com/in/antony-mbugua"
    - label: "Hack The Box"
      icon: "fas fa-terminal"
      url: "https://app.hackthebox.com/profile/kiregi742"
    - label: "TryHackMe"
      icon: "fas fa-user-secret"
      url: "https://tryhackme.com/p/incog742"
    - label: "Resume"
      icon: "fas fa-file-pdf"
      url: "/assets/docs/resume.pdf"

# ---------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------
plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# ---------------------------------------------------------------
# Content Defaults
# ---------------------------------------------------------------
defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      toc: true
      toc_label: "Table of Contents"
      toc_sticky: true
      classes: wide
      css: "/assets/css/custom.css"

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
      toc: true
      sidebar:
        nav: "main"

  - scope:
      path: ""
      type: writeups
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      toc: true
      toc_label: "Table of Contents"
      toc_sticky: true
      classes: wide

# ---------------------------------------------------------------
# Collections
# ---------------------------------------------------------------
collections:
  pages:
    output: true
    permalink: /:path/
  projects:
    output: true
    permalink: /projects/:path/
  writeups:
    output: true
    permalink: /writeups/:name/

# ---------------------------------------------------------------
# Security Headers
# ---------------------------------------------------------------
security:
  headers: true
  csp: "default-src 'self'; img-src 'self' data:;"
  feature_policy: "camera 'none'"

# ---------------------------------------------------------------
# Exclude From Build
# ---------------------------------------------------------------
exclude:
  - "*.lock"
  - "*.gem"
  - "vendor"
  - "Gemfile"
  - "README.md"
  - "LICENSE"
